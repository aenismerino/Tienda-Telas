spring.application.name=envio-service
server.address=0.0.0.0
server.port=8082

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/tienda_envio?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

logging.level.com.tuproyecto.shipping=DEBUG

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
logging.file.name=/logs/envio-service.log
