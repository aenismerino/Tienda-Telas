spring.application.name=pago-service
server.address=0.0.0.0
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/db_pago?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.tuproyecto.payment=DEBUG

logging.level.com.tuproyecto.payment.client.OrderClient=DEBUG

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html