server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG

management:
  endpoint:
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: gateway, health, info

spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1

            - id: envio-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/shipments/**
              filters:
                - StripPrefix=1

            - id: inventario
              uri: http://localhost:8083
              predicates:
                - Path=/api/productos/**
              filters:
                - StripPrefix=1
            
            - id: pago-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/payments/**
              filters:
                - StripPrefix=1

            - id: pedidos-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/pedidos/**
              filters:
                - StripPrefix=1

            - id: carrito
              uri: http://localhost:8085
              predicates:
                - Path=/api/carrito/**
              filters:
                - StripPrefix=1

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false